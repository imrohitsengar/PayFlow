name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

env:
  NODE_VERSION: "20"

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (all workspaces)
        run: npm run lint

  # ── Type-check ─────────────────────────────────────────────────────────────
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd packages/db && npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/paytm_test

      - name: Type-check user-app
        run: cd apps/user-app && npx tsc --noEmit
        env:
          JWT_SECRET: "ci-test-jwt-secret-at-least-32-chars!!"
          NEXTAUTH_URL: "http://localhost:3001"
          DATABASE_URL: "postgresql://test:test@localhost:5432/paytm_test"
          RAZORPAY_KEY_ID: "rzp_test_ci_placeholder"
          RAZORPAY_KEY_SECRET: "ci_razorpay_secret_placeholder"

      - name: Type-check bank-webhook
        run: cd apps/bank-webhook && npx tsc --noEmit

  # ── Unit Tests ─────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: paytm
          POSTGRES_PASSWORD: paytm_secret
          POSTGRES_DB: paytm_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://paytm:paytm_secret@localhost:5432/paytm_test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd packages/db && npx prisma generate

      - name: Run bank-webhook tests
        run: npm run test --workspace=apps/bank-webhook
        env:
          RAZORPAY_WEBHOOK_SECRET: "ci-razorpay-webhook-secret-at-least-32-chars!!"

      - name: Run user-app tests
        run: npm run test --workspace=apps/user-app
        env:
          JWT_SECRET: "ci-test-jwt-secret-at-least-32-chars!!"
          NEXTAUTH_URL: "http://localhost:3001"
          RAZORPAY_KEY_ID: "rzp_test_ci_placeholder"
          RAZORPAY_KEY_SECRET: "ci_razorpay_secret_placeholder"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: |
            apps/bank-webhook/coverage/
            apps/user-app/coverage/
          retention-days: 7

  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: cd packages/db && npx prisma generate
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Build all workspaces
        run: npm run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          JWT_SECRET: "ci-build-jwt-secret-at-least-32-chars!!"
          NEXTAUTH_URL: "http://localhost:3001"
          NEXTAUTH_SECRET: "ci-build-nextauth-secret-32-chars!!"
          GOOGLE_CLIENT_ID: "ci-placeholder"
          GOOGLE_CLIENT_SECRET: "ci-placeholder"
          RAZORPAY_WEBHOOK_SECRET: "ci-razorpay-webhook-secret-at-least-32-chars!!"
          RAZORPAY_KEY_ID: "rzp_test_ci_placeholder"
          RAZORPAY_KEY_SECRET: "ci_razorpay_secret_placeholder"
          NEXT_PUBLIC_RAZORPAY_KEY_ID: "rzp_test_ci_placeholder"
          NEXT_PUBLIC_SKIP_BUILD_STATIC_GENERATION: "true"
